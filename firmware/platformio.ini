; ESP32 firmware — BLE provisioning + HTTP telemetry (TEC Sensor Monitor)
[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@7.3.0
build_flags =
    -DUSE_FAKE_CURRENT_SENSOR=1

[env:esp32dev_ina219]
extends = env:esp32dev
build_flags =
    -DUSE_FAKE_CURRENT_SENSOR=0
lib_deps =
    ${env:esp32dev.lib_deps}
    adafruit/Adafruit INA219@1.2.3
